<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kitchen Display</title>

<!-- installable like the kiosk -->
<meta name="theme-color" content="#2b2018">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kitchen">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<style>
  :root {
    --bg: #1d1611;
    --card: #2b2018;
    --ink: #f4ece2;
    --muted: #b09a85;
    --line: #3d2f24;
    --accent: #d9a066;
    --hot: #e06a4f;
    --ice: #4aa3df;
    --done: #2e7d52;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Apple SD Gothic Neo", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 16px 22px;
    background: #140f0b;
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 5;
  }
  header h1 { margin: 0; font-size: 20px; letter-spacing: .5px; }
  header h1 small { color: var(--muted); font-size: 13px; font-weight: 400; margin-left: 8px; }
  .pending-count {
    background: var(--accent); color: #2b2018;
    font-weight: 800; border-radius: 20px; padding: 6px 14px; font-size: 14px;
  }
  .reset-btn {
    background: transparent; color: var(--muted);
    border: 1px solid var(--line); border-radius: 18px;
    padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  .reset-btn:hover { color: var(--ink); border-color: var(--muted); }

  .board {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    padding: 18px;
    align-items: start;
  }
  .empty {
    text-align: center; color: var(--muted);
    padding: 80px 20px; font-size: 16px;
  }
  .empty .big { font-size: 56px; display: block; margin-bottom: 12px; }

  .ticket {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 6px 16px rgba(0,0,0,.3);
    animation: pop .25s ease;
  }
  @keyframes pop { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .ticket.fresh { outline: 2px solid var(--accent); }

  .ticket .t-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    background: #34271d;
    border-bottom: 1px solid var(--line);
  }
  .t-head .no { font-size: 20px; font-weight: 800; }
  .t-head .type {
    font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 12px;
    background: #4a3a2c; color: var(--ink);
  }
  .t-head .time { font-size: 12px; color: var(--muted); }

  .t-items { padding: 8px; display: flex; flex-direction: column; gap: 8px; }
  .item {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    background: #21190f00;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 12px;
    cursor: pointer;
    text-align: left;
    color: var(--ink);
    font-size: 16px;
    transition: background .12s, transform .08s;
  }
  .item:hover { background: #3a2c20; }
  .item:active { transform: scale(.98); }
  .item .emoji { font-size: 22px; }
  .item .label { flex: 1; font-weight: 600; }
  .item .badge {
    font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 8px; color: #fff;
  }
  .item .badge.HOT { background: var(--hot); }
  .item .badge.ICED { background: var(--ice); }
  .item .qty {
    background: var(--accent); color: #2b2018; font-weight: 800;
    border-radius: 8px; padding: 2px 9px; font-size: 14px; min-width: 30px; text-align: center;
  }
  .item .check { color: var(--muted); font-size: 18px; }

  .t-foot {
    padding: 8px 14px 12px;
  }
  .done-all {
    width: 100%; border: none; border-radius: 10px;
    background: var(--done); color: #fff; font-weight: 700;
    padding: 10px; cursor: pointer; font-size: 14px;
  }
  .done-all:hover { filter: brightness(1.08); }

  .stat { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
  <header>
    <h1>🍳 주방 화면 <small>Kitchen Display</small></h1>
    <span class="pending-count" id="pendingCount">대기 0</span>
    <button class="reset-btn" id="resetBtn">전체 초기화</button>
  </header>

  <main class="board" id="board"></main>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="./store.js"></script>
<script>
  const board = document.getElementById("board");
  const pendingCountEl = document.getElementById("pendingCount");

  let lastOrderIds = new Set();   // to detect newly arrived orders
  let beepCtx = null;

  function timeAgo(ms) {
    const sec = Math.floor((Date.now() - ms) / 1000);
    if (sec < 60) return "방금";
    const min = Math.floor(sec / 60);
    if (min < 60) return min + "분 전";
    return Math.floor(min / 60) + "시간 전";
  }

  function beep() {
    try {
      beepCtx = beepCtx || new (window.AudioContext || window.webkitAudioContext)();
      const o = beepCtx.createOscillator();
      const g = beepCtx.createGain();
      o.connect(g); g.connect(beepCtx.destination);
      o.type = "sine"; o.frequency.value = 880;
      g.gain.setValueAtTime(0.001, beepCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.2, beepCtx.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, beepCtx.currentTime + 0.25);
      o.start(); o.stop(beepCtx.currentTime + 0.26);
    } catch {}
  }

  function completeItem(key, itemIndex) {
    const order = KioskStore.loadOrders().find(o => o._key === key);
    if (!order) return;
    order.items[itemIndex].done = true;
    // if everything in this order is now done, remove the whole ticket
    if (order.items.every(it => it.done)) KioskStore.removeOrder(key);
    else KioskStore.setItems(key, order.items);
  }

  function completeOrder(key) {
    KioskStore.removeOrder(key);
  }

  function render() {
    const orders = KioskStore.loadOrders();
    // only orders that still have something to make, oldest first
    const pending = orders
      .filter(o => o.items.some(it => !it.done))
      .sort((a, b) => a.time - b.time);

    // beep when a brand-new order shows up
    const currentIds = new Set(pending.map(o => o._key));
    for (const id of currentIds) {
      if (!lastOrderIds.has(id)) { beep(); break; }
    }
    lastOrderIds = currentIds;

    pendingCountEl.textContent = "대기 " + pending.length;

    if (pending.length === 0) {
      board.innerHTML = '<div class="empty"><span class="big">✅</span>지금 만들 주문이 없습니다.<br><span class="stat">손님이 결제하면 여기에 자동으로 나타납니다.</span></div>';
      return;
    }

    board.innerHTML = "";
    for (const order of pending) {
      const icon = order.orderType === "Dine In" ? "🍽️" : "🥤";
      const typeKo = order.orderType === "Dine In" ? "매장" : "포장";
      const fresh = (Date.now() - order.time) < 15000 ? "fresh" : "";

      const card = document.createElement("div");
      card.className = "ticket " + fresh;

      let itemsHtml = "";
      order.items.forEach((it, idx) => {
        if (it.done) return; // hide finished items
        const badge = it.temp ? `<span class="badge ${it.temp}">${it.temp}</span>` : "";
        itemsHtml += `
          <button class="item" data-oid="${order._key}" data-idx="${idx}">
            <span class="emoji">${it.emoji || "🍽️"}</span>
            ${badge}
            <span class="label">${it.name}</span>
            <span class="qty">x${it.qty}</span>
            <span class="check">⭕</span>
          </button>`;
      });

      card.innerHTML = `
        <div class="t-head">
          <span class="no">#${String(order.number).padStart(3, "0")}</span>
          <span class="type">${icon} ${typeKo}</span>
          <span class="time">${timeAgo(order.time)}</span>
        </div>
        <div class="t-items">${itemsHtml}</div>
        <div class="t-foot">
          <button class="done-all" data-done-all="${order._key}">주문 전체 완료</button>
        </div>`;
      board.appendChild(card);
    }

    // wire buttons
    board.querySelectorAll(".item").forEach(btn => {
      btn.onclick = () => completeItem(btn.dataset.oid, Number(btn.dataset.idx));
    });
    board.querySelectorAll(".done-all").forEach(btn => {
      btn.onclick = () => completeOrder(btn.dataset.doneAll);
    });
  }

  document.getElementById("resetBtn").onclick = () => {
    if (confirm("모든 주문 기록을 지울까요? (데모용)")) {
      KioskStore.clearAll();
    }
  };

  // re-render when orders change in another tab, and refresh "time ago" labels
  KioskStore.subscribe(render);
  setInterval(render, 20000);
  render();
</script>
</body>
</html>
