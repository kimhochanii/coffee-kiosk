<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>컴퓨터학부 주막 - 매출 집계</title>
<meta name="theme-color" content="#6f4e37">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="주막 매출">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<style>
  :root {
    --bg: #f4ece2; --panel: #fffaf3; --ink: #3b2a1d; --muted: #9c8772;
    --accent: #6f4e37; --accent-dark: #543a28; --line: #e7dccd;
    --good: #2e7d52; --ice: #2f86c5;
    --shadow: 0 8px 24px rgba(80,55,35,.12);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Apple SD Gothic Neo","Segoe UI",system-ui,sans-serif;
         background: var(--bg); color: var(--ink); min-height: 100vh; }
  header { background: var(--accent); color: #fff; padding: 16px 22px;
           display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 20px; }
  .toggle { display: flex; gap: 6px; background: rgba(255,255,255,.15); padding: 4px; border-radius: 22px; }
  .toggle button { border: none; background: transparent; color: #fff; padding: 7px 16px;
                   border-radius: 18px; cursor: pointer; font-weight: 600; font-size: 13px; }
  .toggle button.active { background: #fff; color: var(--accent); }

  .wrap { max-width: 1000px; margin: 20px auto; padding: 0 18px; }

  .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 18px; }
  @media (max-width: 640px) { .kpis { grid-template-columns: 1fr; } }
  .kpi { background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
         padding: 18px 20px; box-shadow: var(--shadow); }
  .kpi .label { color: var(--muted); font-size: 13px; }
  .kpi .value { font-size: 30px; font-weight: 800; color: var(--accent); margin-top: 6px; }

  .grid2 { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; align-items: start; }
  @media (max-width: 760px) { .grid2 { grid-template-columns: 1fr; } }

  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
          padding: 18px; box-shadow: var(--shadow); }
  .card h2 { margin: 0 0 12px; font-size: 16px; }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 9px 6px; font-size: 14px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 600; font-size: 12px; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .bar { height: 8px; background: var(--line); border-radius: 6px; overflow: hidden; margin-top: 4px; }
  .bar > span { display: block; height: 100%; background: var(--accent); }

  .split { display: flex; gap: 12px; }
  .split .seg { flex: 1; text-align: center; padding: 14px; border-radius: 12px; border: 1px solid var(--line); }
  .split .seg .t { font-size: 13px; color: var(--muted); }
  .split .seg .n { font-size: 22px; font-weight: 800; margin-top: 4px; }
  .split .seg .r { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .recent { margin-top: 16px; }
  .empty { color: var(--muted); text-align: center; padding: 30px 0; }
  .clear { margin-top: 18px; text-align: center; }
  .clear button { background: transparent; border: 1px solid var(--line); color: var(--muted);
                  padding: 8px 16px; border-radius: 18px; cursor: pointer; font-size: 12px; }
  .clear button:hover { color: var(--ink); border-color: var(--muted); }
</style>
</head>
<body>
  <header>
    <h1>📊 컴퓨터학부 주막 매출</h1>
    <div class="toggle">
      <button id="todayBtn" class="active">오늘</button>
      <button id="allBtn">전체</button>
    </div>
  </header>

  <div class="wrap">
    <div class="kpis">
      <div class="kpi"><div class="label">총 매출</div><div class="value" id="kRevenue">0원</div></div>
      <div class="kpi"><div class="label">주문 수</div><div class="value" id="kOrders">0</div></div>
      <div class="kpi"><div class="label">판매 수량</div><div class="value" id="kItems">0</div></div>
    </div>

    <div class="grid2">
      <div class="card">
        <h2>메뉴별 판매</h2>
        <table>
          <thead><tr><th>메뉴</th><th class="num">수량</th><th class="num">매출</th></tr></thead>
          <tbody id="menuRows"></tbody>
        </table>
        <div class="empty" id="menuEmpty" style="display:none">아직 판매 기록이 없습니다.</div>
      </div>

      <div class="card">
        <h2>매장 / 포장</h2>
        <div class="split">
          <div class="seg"><div class="t">🍽️ 매장</div><div class="n" id="dineCount">0</div><div class="r" id="dineRev">0원</div></div>
          <div class="seg"><div class="t">🥤 포장</div><div class="n" id="takeCount">0</div><div class="r" id="takeRev">0원</div></div>
        </div>

        <div class="recent">
          <h2 style="margin-top:18px">최근 완료 주문</h2>
          <table>
            <thead><tr><th>번호</th><th>유형</th><th class="num">금액</th><th class="num">시간</th></tr></thead>
            <tbody id="recentRows"></tbody>
          </table>
          <div class="empty" id="recentEmpty" style="display:none">기록 없음</div>
        </div>
      </div>
    </div>

    <div class="clear">
      <button id="clearBtn">매출 기록 초기화 (데모용)</button>
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="./store.js"></script>
<script>
  let range = "today"; // "today" | "all"
  const won = n => (n || 0).toLocaleString("ko-KR") + "원";

  function startOfToday() {
    const d = new Date(); d.setHours(0, 0, 0, 0); return d.getTime();
  }
  function orderTotal(o) {
    if (typeof o.total === "number") return o.total;
    return (o.items || []).reduce((s, it) => s + (it.price || 0) * (it.qty || 0), 0);
  }
  function fmtTime(ms) {
    const d = new Date(ms);
    return d.getHours().toString().padStart(2, "0") + ":" + d.getMinutes().toString().padStart(2, "0");
  }

  document.getElementById("todayBtn").onclick = () => { range = "today"; setToggle(); render(); };
  document.getElementById("allBtn").onclick   = () => { range = "all";   setToggle(); render(); };
  function setToggle() {
    document.getElementById("todayBtn").classList.toggle("active", range === "today");
    document.getElementById("allBtn").classList.toggle("active", range === "all");
  }

  document.getElementById("clearBtn").onclick = () => {
    if (confirm("매출 기록을 모두 지울까요? (되돌릴 수 없음, 데모용)")) KioskStore.clearSales();
  };

  function render() {
    let sales = KioskStore.loadSales();
    if (range === "today") {
      const t0 = startOfToday();
      sales = sales.filter(s => (s.completedAt || s.time || 0) >= t0);
    }

    // KPIs
    const revenue = sales.reduce((s, o) => s + orderTotal(o), 0);
    const itemCount = sales.reduce((s, o) => s + (o.items || []).reduce((a, it) => a + (it.qty || 0), 0), 0);
    document.getElementById("kRevenue").textContent = won(revenue);
    document.getElementById("kOrders").textContent = sales.length;
    document.getElementById("kItems").textContent = itemCount;

    // Menu breakdown
    const byMenu = {};
    for (const o of sales) for (const it of (o.items || [])) {
      const key = (it.temp ? it.temp + " " : "") + it.name;
      if (!byMenu[key]) byMenu[key] = { qty: 0, rev: 0, emoji: it.emoji || "" };
      byMenu[key].qty += it.qty || 0;
      byMenu[key].rev += (it.price || 0) * (it.qty || 0);
    }
    const rows = Object.entries(byMenu).sort((a, b) => b[1].rev - a[1].rev);
    const maxRev = rows.length ? rows[0][1].rev : 0;
    const tbody = document.getElementById("menuRows");
    tbody.innerHTML = "";
    rows.forEach(([name, v]) => {
      const tr = document.createElement("tr");
      const pct = maxRev ? Math.round(v.rev / maxRev * 100) : 0;
      tr.innerHTML = `
        <td>${v.emoji} ${name}<div class="bar"><span style="width:${pct}%"></span></div></td>
        <td class="num">${v.qty}</td>
        <td class="num">${won(v.rev)}</td>`;
      tbody.appendChild(tr);
    });
    document.getElementById("menuEmpty").style.display = rows.length ? "none" : "block";

    // Dine-in vs take-out
    let dineC = 0, dineR = 0, takeC = 0, takeR = 0;
    for (const o of sales) {
      const t = orderTotal(o);
      if (o.orderType === "Dine In") { dineC++; dineR += t; }
      else { takeC++; takeR += t; }
    }
    document.getElementById("dineCount").textContent = dineC;
    document.getElementById("dineRev").textContent = won(dineR);
    document.getElementById("takeCount").textContent = takeC;
    document.getElementById("takeRev").textContent = won(takeR);

    // Recent completed (newest first, up to 10)
    const recent = [...sales].sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0)).slice(0, 10);
    const rbody = document.getElementById("recentRows");
    rbody.innerHTML = "";
    recent.forEach(o => {
      const typeKo = o.orderType === "Dine In" ? (o.table ? "🍽️ " + o.table + "번" : "🍽️ 매장") : "🥤 포장";
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>#${String(o.number || 0).padStart(3, "0")}</td>
        <td>${typeKo}</td>
        <td class="num">${won(orderTotal(o))}</td>
        <td class="num">${fmtTime(o.completedAt || o.time || Date.now())}</td>`;
      rbody.appendChild(tr);
    });
    document.getElementById("recentEmpty").style.display = recent.length ? "none" : "block";
  }

  KioskStore.subscribeSales(render);
  render();
</script>
</body>
</html>
