<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>주문 키오스크</title>

<!-- PWA / installable-app settings -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#6f4e37">
<!-- iOS "Add to Home Screen" support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="주문 키오스크">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<style>
  :root {
    --bg: #f4ece2;
    --panel: #fffaf3;
    --ink: #3b2a1d;
    --muted: #9c8772;
    --accent: #6f4e37;
    --accent-dark: #543a28;
    --line: #e7dccd;
    --good: #2e7d52;
    --hot: #d9534f;
    --ice: #2f86c5;
    --shadow: 0 8px 24px rgba(80, 55, 35, 0.12);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", "Apple SD Gothic Neo", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  header {
    background: var(--accent);
    color: #fff;
    padding: 18px 24px;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative;
  }
  header h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
  header p { margin: 4px 0 0; opacity: .8; font-size: 13px; }
  .order-type-badge {
    position: absolute;
    right: 20px; top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.4);
    color: #fff;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
  }
  .order-type-badge:hover { background: rgba(255,255,255,.28); }
  @media (max-width: 640px) {
    .order-type-badge { position: static; transform: none; display: inline-block; margin-top: 10px; }
  }

  /* ----- Start screen ----- */
  #startScreen {
    min-height: calc(100vh - 0px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 40px 20px;
  }
  #startScreen .welcome { text-align: center; }
  #startScreen .welcome .logo { font-size: 64px; }
  #startScreen .welcome h1 { margin: 8px 0 4px; font-size: 30px; }
  #startScreen .welcome p { margin: 0; color: var(--muted); }
  .order-choices { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .choice-card {
    width: 220px;
    background: var(--panel);
    border: 2px solid var(--line);
    border-radius: 20px;
    padding: 36px 20px;
    cursor: pointer;
    text-align: center;
    transition: transform .12s, box-shadow .12s, border-color .12s;
  }
  .choice-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow);
    border-color: var(--accent);
  }
  .choice-card .ico { font-size: 56px; }
  .choice-card .t { font-size: 20px; font-weight: 700; margin-top: 12px; }
  .choice-card .d { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* ----- Table number screen ----- */
  #tableScreen {
    min-height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 40px 20px;
  }
  #tableScreen h2 { margin: 0; font-size: 26px; }
  #tableScreen .sub { color: var(--muted); margin-top: 6px; font-size: 14px; }
  .table-display {
    font-size: 56px; font-weight: 800; color: var(--accent);
    min-height: 70px; letter-spacing: 2px;
    background: var(--panel); border: 2px solid var(--line); border-radius: 16px;
    min-width: 220px; text-align: center; padding: 8px 24px;
  }
  .keypad { display: grid; grid-template-columns: repeat(3, 92px); gap: 14px; }
  .keypad button {
    height: 92px; font-size: 28px; font-weight: 700;
    border: 1px solid var(--line); background: var(--panel);
    border-radius: 16px; cursor: pointer; color: var(--ink);
  }
  .keypad button:hover { background: #fff; box-shadow: var(--shadow); }
  .keypad .ok { background: var(--accent); color: #fff; border: none; }
  .keypad .ok:hover { background: var(--accent-dark); }

  /* ----- Main / menu ----- */
  #mainScreen { display: none; }
  .layout {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 20px;
    max-width: 1100px;
    margin: 24px auto;
    padding: 0 20px;
  }
  @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }

  .category-title {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin: 18px 0 10px;
  }
  .category-title:first-child { margin-top: 0; }
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }
  .menu-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    transition: transform .12s, box-shadow .12s, border-color .12s;
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-align: left;
    position: relative;
  }
  .menu-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow);
    border-color: var(--accent);
  }
  .menu-card .emoji { font-size: 30px; }
  .menu-card .name { font-weight: 600; }
  .menu-card .price { color: var(--accent); font-weight: 600; }
  .menu-card .temp-tag {
    position: absolute; top: 12px; right: 12px;
    font-size: 11px; color: var(--muted);
    border: 1px solid var(--line); border-radius: 10px; padding: 2px 7px;
  }

  /* ----- Cart ----- */
  .cart {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 18px;
    position: sticky;
    top: 20px;
    align-self: start;
  }
  .cart h2 { margin: 0 0 4px; font-size: 18px; }
  .cart .order-mode { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .cart-empty { color: var(--muted); text-align: center; padding: 28px 0; }
  .cart-line {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--line);
  }
  .cart-line .info { flex: 1; }
  .cart-line .info .nm { font-weight: 600; font-size: 14px; }
  .cart-line .info .sub { font-size: 12px; color: var(--muted); }
  .badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; color: #fff; margin-right: 4px; vertical-align: middle; }
  .badge.HOT { background: var(--hot); }
  .badge.ICED { background: var(--ice); }
  .qty { display: flex; align-items: center; gap: 6px; }
  .qty button {
    width: 26px; height: 26px;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px; line-height: 1;
    color: var(--accent);
  }
  .qty button:hover { background: var(--bg); }
  .qty span { min-width: 20px; text-align: center; font-weight: 600; }

  .totals {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 2px solid var(--ink);
    display: flex;
    justify-content: space-between;
    font-size: 18px;
    font-weight: 700;
  }
  .actions { margin-top: 14px; display: flex; gap: 10px; }
  .btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
  .btn-ghost { background: #fff; color: var(--accent); border: 1px solid var(--line); }
  .btn-ghost:hover { background: var(--bg); }

  /* ----- Modal ----- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(40, 28, 18, .5);
    display: none;
    align-items: center; justify-content: center;
    padding: 20px; z-index: 10;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--panel);
    border-radius: 18px;
    padding: 24px;
    width: 100%; max-width: 380px;
    box-shadow: var(--shadow);
  }
  .modal h3 { margin: 0 0 16px; }

  /* temperature choice */
  .temp-choices { display: flex; gap: 12px; margin-bottom: 16px; }
  .temp-btn {
    flex: 1;
    padding: 22px 0;
    border-radius: 14px;
    border: 2px solid var(--line);
    background: #fff;
    cursor: pointer;
    font-size: 18px; font-weight: 700;
  }
  .temp-btn .ic { display: block; font-size: 30px; margin-bottom: 6px; }
  .temp-btn.hot:hover { border-color: var(--hot); color: var(--hot); }
  .temp-btn.ice:hover { border-color: var(--ice); color: var(--ice); }

  /* card payment */
  .pay-summary { text-align: center; margin-bottom: 18px; }
  .pay-summary .amt { font-size: 30px; font-weight: 800; color: var(--accent); }
  .pay-summary .mode { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .card-visual {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff; border-radius: 14px; padding: 20px; margin-bottom: 18px;
    min-height: 110px; display: flex; flex-direction: column; justify-content: space-between;
  }
  .card-visual .chip { width: 36px; height: 26px; background: #e7c873; border-radius: 5px; }
  .card-visual .num { letter-spacing: 3px; font-family: "Courier New", monospace; }
  .processing { text-align: center; padding: 20px 0; color: var(--muted); }
  .processing .spin {
    width: 38px; height: 38px; margin: 0 auto 12px;
    border: 4px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* receipt */
  .receipt { font-family: "Courier New", monospace; }
  .receipt .r-line { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
  .receipt hr { border: none; border-top: 1px dashed var(--ink); margin: 8px 0; }
  .receipt .r-total { font-weight: 700; font-size: 15px; }
  .receipt .thanks { text-align: center; margin-top: 14px; color: var(--accent); }
</style>
</head>
<body>
  <!-- ============ START SCREEN ============ -->
  <section id="startScreen">
    <div class="welcome">
      <div class="logo">☕</div>
      <h1>주문 키오스크</h1>
      <p>How would you like your order?</p>
    </div>
    <div class="order-choices">
      <div class="choice-card" data-type="Dine In">
        <div class="ico">🍽️</div>
        <div class="t">Dine In</div>
        <div class="d">매장에서 먹기</div>
      </div>
      <div class="choice-card" data-type="Take Out">
        <div class="ico">🥤</div>
        <div class="t">Take Out</div>
        <div class="d">포장하기</div>
      </div>
    </div>
  </section>

  <!-- ============ TABLE NUMBER SCREEN (dine-in only) ============ -->
  <section id="tableScreen">
    <div style="text-align:center">
      <h2>테이블 번호 입력</h2>
      <div class="sub">번호를 입력하고 확인을 누르세요</div>
    </div>
    <div class="table-display" id="tableDisplay">—</div>
    <div class="keypad" id="keypad">
      <button>1</button><button>2</button><button>3</button>
      <button>4</button><button>5</button><button>6</button>
      <button>7</button><button>8</button><button>9</button>
      <button data-act="back">←</button>
      <button>0</button>
      <button data-act="ok" class="ok">확인</button>
    </div>
    <button class="btn btn-ghost" id="tableCancel" style="width:200px">처음으로</button>
  </section>

  <!-- ============ MAIN SCREEN ============ -->
  <section id="mainScreen">
    <header>
      <h1>☕ 주문 키오스크</h1>
      <p>메뉴를 눌러 담으세요</p>
      <div class="order-type-badge" id="orderTypeBadge" title="Change order type"></div>
    </header>

    <div class="layout">
      <main id="menu"></main>

      <aside class="cart">
        <h2>🛒 Your Order</h2>
        <div class="order-mode" id="cartOrderMode"></div>
        <div id="cartLines"></div>
        <div class="totals">
          <span>Total</span>
          <span id="cartTotal">0 won</span>
        </div>
        <div class="actions">
          <button class="btn btn-ghost" id="clearBtn">Clear</button>
          <button class="btn btn-primary" id="checkoutBtn" disabled>Pay by Card</button>
        </div>
      </aside>
    </div>
  </section>

  <!-- Modal host -->
  <div class="overlay" id="overlay">
    <div class="modal" id="modal"></div>
  </div>

<a href="./kitchen.html" target="_blank" style="position:fixed;left:14px;bottom:14px;background:#6f4e37;color:#fff;text-decoration:none;padding:9px 14px;border-radius:20px;font:600 13px system-ui;box-shadow:0 4px 12px rgba(80,55,35,.25);z-index:5">🍳 주방 키오스크 열기</a>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="./store.js"></script>
<script>
  // ----- Register service worker so the app works offline -----
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }

  // ----- Menu data (mirrors CoffeeKiosk.java) -----
  // hasTemp = true for drinks that can be HOT or ICED (Coffee & Tea)
  const MENU = [
    { id: 1,  name: "Americano",        price: 3000, category: "Coffee",  emoji: "☕", hasTemp: true },
    { id: 2,  name: "Cafe Latte",       price: 3500, category: "Coffee",  emoji: "🥛", hasTemp: true },
    { id: 3,  name: "Cappuccino",       price: 3500, category: "Coffee",  emoji: "☕", hasTemp: true },
    { id: 4,  name: "Vanilla Latte",    price: 4000, category: "Coffee",  emoji: "🍦", hasTemp: true },
    { id: 5,  name: "Cold Brew",        price: 4000, category: "Coffee",  emoji: "🧊", hasTemp: true },
    { id: 6,  name: "Green Tea",        price: 3000, category: "Tea",     emoji: "🍵", hasTemp: true },
    { id: 7,  name: "Peach Iced Tea",   price: 3500, category: "Tea",     emoji: "🍑", hasTemp: true },
    { id: 8,  name: "Hot Chocolate",    price: 4000, category: "Tea",     emoji: "🍫", hasTemp: true },
    { id: 9,  name: "Cheesecake",       price: 4500, category: "Dessert", emoji: "🍰", hasTemp: false },
    { id: 10, name: "Croissant",        price: 3000, category: "Dessert", emoji: "🥐", hasTemp: false },
    { id: 11, name: "Chocolate Muffin", price: 3500, category: "Dessert", emoji: "🧁", hasTemp: false },
  ];

  let orderType = null;                 // "Dine In" | "Take Out"
  let tableNumber = null;               // number (dine-in only)
  let tableInput = "";                  // keypad buffer
  const cart = new Map();               // key -> { item, qty, temp }

  const won = n => n.toLocaleString("en-US") + " won";
  const lineKey = (id, temp) => temp ? `${id}-${temp}` : `${id}`;

  // Human label for the chosen order type (with table number for dine-in)
  function modeLabel() {
    if (orderType === "Dine In") return `🍽️ 매장 · 테이블 ${tableNumber}번`;
    return "🥤 포장";
  }

  // ----- Screen switching -----
  function showScreen(id) {
    ["startScreen", "tableScreen", "mainScreen"].forEach(s => {
      document.getElementById(s).style.display =
        (s === id) ? (s === "mainScreen" ? "block" : "flex") : "none";
    });
  }

  function goToMenu() {
    showScreen("mainScreen");
    updateOrderTypeUI();
    renderMenu();
    renderCart();
  }

  // ----- Start screen -> choose order type -----
  document.querySelectorAll(".choice-card").forEach(card => {
    card.onclick = () => {
      orderType = card.dataset.type;
      if (orderType === "Dine In") {
        tableInput = "";
        updateTableDisplay();
        showScreen("tableScreen");   // ask for table number first
      } else {
        tableNumber = null;
        goToMenu();                  // take-out: straight to menu
      }
    };
  });

  // ----- Table number keypad -----
  function updateTableDisplay() {
    document.getElementById("tableDisplay").textContent = tableInput === "" ? "—" : tableInput;
  }
  document.getElementById("keypad").addEventListener("click", e => {
    const b = e.target.closest("button");
    if (!b) return;
    const act = b.dataset.act;
    if (act === "back") {
      tableInput = tableInput.slice(0, -1);
    } else if (act === "ok") {
      if (tableInput === "" || parseInt(tableInput, 10) === 0) return; // need a valid table
      tableNumber = parseInt(tableInput, 10);
      goToMenu();
      return;
    } else if (tableInput.length < 3) {
      tableInput += b.textContent.trim();
    }
    updateTableDisplay();
  });
  document.getElementById("tableCancel").onclick = () => showScreen("startScreen");

  function updateOrderTypeUI() {
    document.getElementById("orderTypeBadge").textContent = modeLabel() + "  ⟳";
    document.getElementById("cartOrderMode").textContent = modeLabel();
  }

  // Tap badge to go back to start screen (changes order type; keeps cart)
  document.getElementById("orderTypeBadge").onclick = () => showScreen("startScreen");

  // ----- Render menu grouped by category -----
  function renderMenu() {
    const root = document.getElementById("menu");
    root.innerHTML = "";
    let lastCat = null, grid = null;
    for (const m of MENU) {
      if (m.category !== lastCat) {
        lastCat = m.category;
        const h = document.createElement("div");
        h.className = "category-title";
        h.textContent = m.category;
        root.appendChild(h);
        grid = document.createElement("div");
        grid.className = "menu-grid";
        root.appendChild(grid);
      }
      const card = document.createElement("button");
      card.className = "menu-card";
      card.innerHTML = `
        ${m.hasTemp ? '<span class="temp-tag">HOT / ICED</span>' : ''}
        <div class="emoji">${m.emoji}</div>
        <div class="name">${m.name}</div>
        <div class="price">${won(m.price)}</div>`;
      card.onclick = () => onPickItem(m);
      grid.appendChild(card);
    }
  }

  // ----- Picking an item: ask HOT/ICED for drinks, else add directly -----
  function onPickItem(item) {
    if (item.hasTemp) openTempModal(item);
    else addToCart(item, null);
  }

  function openTempModal(item) {
    modal.innerHTML = `
      <h3>${item.emoji} ${item.name}</h3>
      <p style="margin-top:-6px;color:var(--muted);font-size:13px">Choose temperature</p>
      <div class="temp-choices">
        <button class="temp-btn hot" id="hotBtn"><span class="ic">🔥</span>HOT</button>
        <button class="temp-btn ice" id="iceBtn"><span class="ic">🧊</span>ICED</button>
      </div>
      <div class="actions">
        <button class="btn btn-ghost" id="tempCancel">Cancel</button>
      </div>`;
    showModal();
    document.getElementById("hotBtn").onclick = () => { addToCart(item, "HOT"); closeModal(); };
    document.getElementById("iceBtn").onclick = () => { addToCart(item, "ICED"); closeModal(); };
    document.getElementById("tempCancel").onclick = closeModal;
  }

  // ----- Cart operations -----
  function addToCart(item, temp) {
    const key = lineKey(item.id, temp);
    if (cart.has(key)) cart.get(key).qty++;
    else cart.set(key, { item, qty: 1, temp });
    renderCart();
  }
  function changeQty(key, delta) {
    const line = cart.get(key);
    if (!line) return;
    line.qty += delta;
    if (line.qty <= 0) cart.delete(key);
    renderCart();
  }
  function cartTotal() {
    let t = 0;
    for (const { item, qty } of cart.values()) t += item.price * qty;
    return t;
  }

  function renderCart() {
    const box = document.getElementById("cartLines");
    box.innerHTML = "";
    if (cart.size === 0) {
      box.innerHTML = '<div class="cart-empty">Your cart is empty</div>';
    } else {
      for (const [key, { item, qty, temp }] of cart.entries()) {
        const row = document.createElement("div");
        row.className = "cart-line";
        const badge = temp ? `<span class="badge ${temp}">${temp}</span>` : "";
        row.innerHTML = `
          <div class="info">
            <div class="nm">${badge}${item.emoji} ${item.name}</div>
            <div class="sub">${won(item.price)} · ${won(item.price * qty)}</div>
          </div>
          <div class="qty">
            <button aria-label="decrease">−</button>
            <span>${qty}</span>
            <button aria-label="increase">+</button>
          </div>`;
        const [minus, , plus] = row.querySelectorAll(".qty *");
        minus.onclick = () => changeQty(key, -1);
        plus.onclick = () => changeQty(key, +1);
        box.appendChild(row);
      }
    }
    document.getElementById("cartTotal").textContent = won(cartTotal());
    document.getElementById("checkoutBtn").disabled = cart.size === 0;
  }

  document.getElementById("clearBtn").onclick = () => { cart.clear(); renderCart(); };
  document.getElementById("checkoutBtn").onclick = openPayment;

  // ----- Modal helpers -----
  const overlay = document.getElementById("overlay");
  const modal = document.getElementById("modal");
  function showModal() { overlay.classList.add("show"); }
  function closeModal() { overlay.classList.remove("show"); }
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };

  // ----- Card payment flow -----
  function openPayment() {
    const total = cartTotal();
    modal.innerHTML = `
      <h3>💳 Card Payment</h3>
      <div class="pay-summary">
        <div class="amt">${won(total)}</div>
        <div class="mode">${modeLabel()}</div>
      </div>
      <div class="card-visual">
        <div class="chip"></div>
        <div class="num">**** **** **** 1234</div>
      </div>
      <p style="text-align:center;color:var(--muted);font-size:13px;margin:0 0 16px">
        Please insert or tap your card.
      </p>
      <div class="actions">
        <button class="btn btn-ghost" id="payCancel">Cancel</button>
        <button class="btn btn-primary" id="payConfirm">Pay ${won(total)}</button>
      </div>`;
    showModal();
    document.getElementById("payCancel").onclick = closeModal;
    document.getElementById("payConfirm").onclick = () => processCard(total);
  }

  function processCard(total) {
    modal.innerHTML = `
      <div class="processing">
        <div class="spin"></div>
        Processing card payment…
      </div>`;
    setTimeout(() => showReceipt(total), 1200);
  }

  // ----- Receipt -----
  function showReceipt(total) {
    // Send this paid order to the cloud -> kitchen kiosk picks it up.
    // The order number is assigned by Firebase so multiple order kiosks
    // never produce duplicate numbers.
    const orderData = {
      orderType,
      table: orderType === "Dine In" ? tableNumber : null,
      time: Date.now(),
      total: total,
      items: [...cart.values()].map(({ item, qty, temp }) => ({
        name: item.name, emoji: item.emoji, temp, qty, price: item.price, done: false
      }))
    };

    let lines = "";
    for (const { item, qty, temp } of cart.values()) {
      const label = (temp ? temp + " " : "") + item.name;
      lines += `<div class="r-line"><span>${label} x${qty}</span><span>${won(item.price * qty)}</span></div>`;
    }
    modal.innerHTML = `
      <div class="receipt">
        <h3 style="text-align:center;margin-top:0">☕ RECEIPT</h3>
        <div class="r-line"><span>주문번호</span><span id="rcptNo">…</span></div>
        <div class="r-line"><span>주문 유형</span><span>${modeLabel()}</span></div>
        <hr>
        ${lines}
        <hr>
        <div class="r-line r-total"><span>TOTAL</span><span>${won(total)}</span></div>
        <div class="r-line"><span>Payment</span><span>Card · Approved</span></div>
        <hr>
        <div class="thanks">Thank you! Enjoy your order :)</div>
      </div>
      <div class="actions" style="margin-top:18px">
        <button class="btn btn-primary" id="doneBtn">New Order</button>
      </div>`;

    // Fill in the cloud-assigned order number when it returns.
    KioskStore.addOrder(orderData).then(num => {
      const el = document.getElementById("rcptNo");
      if (el) el.textContent = "#" + String(num).padStart(3, "0");
    }).catch(() => {
      const el = document.getElementById("rcptNo");
      if (el) el.textContent = "—";
    });

    document.getElementById("doneBtn").onclick = () => {
      cart.clear();
      orderType = null;
      tableNumber = null;
      closeModal();
      showScreen("startScreen");
    };
  }
</script>
</body>
</html>
